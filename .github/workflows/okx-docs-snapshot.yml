name: OKX docs snapshot

on:
  push:
    branches:
      - codex/okx-docs-snapshot
    paths:
      - .github/workflows/okx-docs-snapshot.yml

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch official OKX V5 documentation
        run: |
          curl --fail --location --compressed --retry 3 \
            --user-agent 'Mozilla/5.0 (compatible; rust-okx-doc-audit/1.0)' \
            https://www.okx.com/docs-v5/en/ \
            --output okx-docs.html
          test "$(wc -c < okx-docs.html)" -gt 1000000
      - name: Save snapshot on temporary branch
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add okx-docs.html
          git commit -m 'chore: capture OKX docs snapshot'
          git push
